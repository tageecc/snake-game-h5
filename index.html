<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>贪吃蛇 H5</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <div id="score-board">
      <span>得分：<span id="score">0</span></span>
      <span>最高分：<span id="high-score">0</span></span>
    </div>
    <canvas id="game-board"></canvas>
    <div id="start-screen">
      <h1>🐍 贪吃蛇</h1>
      <p>按空格键或点击开始</p>
      <button id="start-btn">开始游戏</button>
    </div>
    <div id="game-over-screen" style="display: none;">
      <h1>游戏结束</h1>
      <p>得分：<span id="final-score">0</span></p>
      <button id="restart-btn">重新开始</button>
    </div>
    <div id="mobile-controls" style="display: none;">
      <div class="control-row">
        <button class="control-btn" data-dir="up">▲</button>
      </div>
      <div class="control-row">
        <button class="control-btn" data-dir="left">◀</button>
        <button class="control-btn" data-dir="down">▼</button>
        <button class="control-btn" data-dir="right">▶</button>
      </div>
    </div>
  </div>
  <script src="js/game.js"></script>
</body>
</html>
